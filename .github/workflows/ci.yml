name: CI

on:
  push:
  pull_request:
    branches: [main]

# Default to read-only token; the called workflow re-declares what it needs.
permissions:
  contents: read

jobs:
  # The whole matrix lives in the reusable test.yml so CI and the release gate
  # (release.yml) run byte-for-byte the same checks and can never drift.
  test:
    permissions:
      contents: read
      id-token: write # Codecov OIDC, granted to the called workflow
    uses: ./.github/workflows/test.yml
