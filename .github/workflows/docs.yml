name: Docs
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'docs/**'
      - 'scripts/extract-api/**'
      - 'composer.json'
      - 'composer.lock'
      - 'CHANGELOG.md'
      - 'MIGRATION.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  release: { types: [published] }
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages is single-tenant per repo: serialise deploys instead of cancelling,
# so a release-triggered build can't be killed by a follow-up doc push.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # PHP toolchain for the extractor — pulls the SDK source via the
      # repo's own composer.json so reflection sees PoliPage\* classes.
      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none
      - name: Install SDK Composer deps
        run: composer install --no-interaction --no-progress --prefer-dist

      # Node toolchain for Astro/Starlight.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'docs/package-lock.json'
      - name: Install docs deps
        working-directory: docs
        run: npm ci || npm install --no-audit --no-fund
      - name: Build docs site (extract + astro build)
        working-directory: docs
        run: npm run build
      - name: Verify index exists
        run: test -s docs/dist/index.html

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
