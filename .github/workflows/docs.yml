name: Docs
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'docs/**'
      - 'scripts/extract-api/**'
      - 'composer.json'
      - 'composer.lock'
      - 'CHANGELOG.md'
      - 'MIGRATION.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  release: { types: [published] }
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages is single-tenant per repo: serialise deploys instead of cancelling,
# so a release-triggered build can't be killed by a follow-up doc push.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # PHP toolchain for the extractor — pulls the SDK source via the
      # repo's own composer.json so reflection sees PoliPage\* classes.
      - name: Set up PHP
        uses: shivammathur/setup-php@9e72090525849c5e82e596468b86eb55e9cc5401 # v2.32.0
        with:
          php-version: '8.3'
          tools: composer
          coverage: none
      - name: Install SDK Composer deps
        run: composer install --no-interaction --no-progress --prefer-dist

      # Node toolchain for Astro/Starlight.
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'docs/package-lock.json'
      - name: Install docs deps
        working-directory: docs
        run: npm ci || npm install --no-audit --no-fund
      - name: Build docs site (extract + astro build)
        working-directory: docs
        run: npm run build
      - name: Verify index exists
        run: test -s docs/dist/index.html

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
